<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Search Platform</title>
    <script src="https://unpkg.com/htmx.org@1.9.0"></script>
</head>

<body>
    <h1>Semantic Search Platform</h1>
    <form hx-post="/api/documents/upload" hx-target="#result" enctype="multipart/form-data">
        <input type="file" name="document" accept=".txt">
        <button type="submit">Upload</button>
    </form>
    <div id="result"></div>

    <form hx-get="/api/search" hx-target="#search-result">
        <input type="text" name="q" placeholder="Search...">
        <button type="submit">Search</button>
    </form>
    <div id="search-result"></div>
</body>

</html>
